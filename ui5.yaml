specVersion: "3.1"
metadata:
  name: transener.gestionunifilares
type: application
server:
  customMiddleware:
    - name: fiori-tools-proxy
      afterMiddleware: compression
      configuration:
        ignoreCertError: false
        backend:
          - path: /sap
            url: http://sapdes.transx.net:8632
            client: "200"
            destination: SAP_Gateway
          - path: /destinations/SAP_Gateway
            destination: SAP_Gateway
            url: http://sapdes.transx.net:8632
            client: "200"
            pathPrefix: /
          - path: /destinations/Examinadores_PT15
            destination: Examinadores_PT15
            url: ""
            pathPrefix: /
        ui5:
          path:
            - /resources
            - /test-resources
          url: https://ui5.sap.com
    - name: fiori-tools-appreload
      afterMiddleware: compression
      configuration:
        port: 35729
        path: webapp
        delay: 300
    - name: fiori-tools-preview
      afterMiddleware: fiori-tools-appreload
      configuration:
        component: Transener.GestionUnifilares
        ui5Theme: sap_fiori_3
